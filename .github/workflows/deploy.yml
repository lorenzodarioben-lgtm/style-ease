name: Deploy to GitHub Pages

# Deploy only from the default branch. Pull requests are validated by ci.yml
# but never published.
on:
  push:
    branches: [main]

# Least-privilege token scopes required by the GitHub Pages deployment actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment. In-progress deployments are not cancelled
# so a running publish is allowed to finish cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate (format, lint, test, build)
        run: npm run validate

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload production build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
